name: Build BVL Morning Brief
on:
  push:
    paths:
      - 'briefs/**'
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * 1-5'  
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Build index.html
        run: python3 build.py
      - name: Commit and push
        run: |
          git config user.email "arthur@broadviewlabs.ca"
          git config user.name "BVL GM Partner"
          git add index.html
          git diff --staged --quiet && echo "No changes" || (git commit -m "Brief update" && git push)
